apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawagents.openclaw.io
spec:
  group: openclaw.io
  names:
    kind: OpenClawAgent
    listKind: OpenClawAgentList
    plural: openclawagents
    singular: openclawagent
    shortNames:
    - agent
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              openclawRef:
                type: object
                properties:
                  name:
                    type: string
              id:
                type: string
              name:
                type: string
              model:
                type: string
              enabled:
                type: boolean
              default:
                type: boolean
          status:
            type: object
            properties:
              phase:
                type: string
              message:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: ID
      type: string
      jsonPath: .spec.id
    - name: Model
      type: string
      jsonPath: .spec.model
    - name: Enabled
      type: boolean
      jsonPath: .spec.enabled
    - name: OpenClawRef
      type: string
      jsonPath: .spec.openclawRef.name
    - name: Default
      type: boolean
      jsonPath: .metadata.annotations['openclaw\.io/is-default']
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
