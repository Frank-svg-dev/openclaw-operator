apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclaws.openclaw.io
spec:
  group: openclaw.io
  names:
    kind: Openclaw
    listKind: OpenclawList
    plural: openclaws
    singular: openclaw
    shortNames:
    - oc
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              image:
                type: string
              replicas:
                type: integer
              serviceType:
                type: string
              gatewayPort:
                type: integer
              gatewayBind:
                type: string
              privacy:
                type: boolean
              gatewayToken:
                type: string
              customApiKey:
                type: string
              customBaseUrl:
                type: string
              customModelId:
                type: string
              customProviderId:
                type: string
              customCompatibility:
                type: string
              storage:
                type: object
                properties:
                  accessModes:
                    type: array
                    items:
                      type: string
                  storage:
                    type: string
              resources:
                type: object
                properties:
                  requests:
                    type: object
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                  limits:
                    type: object
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
          status:
            type: object
            properties:
              replicas:
                type: integer
              readyReplicas:
                type: integer
              phase:
                type: string
              message:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Image
      type: string
      jsonPath: .spec.image
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
    - name: Ready
      type: integer
      jsonPath: .status.readyReplicas
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
