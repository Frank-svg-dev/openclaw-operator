apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawchannels.openclaw.io
spec:
  group: openclaw.io
  names:
    kind: OpenClawChannel
    listKind: OpenClawChannelList
    plural: openclawchannels
    singular: openclawchannel
    shortNames:
    - channel
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              openclawRef:
                type: object
                properties:
                  name:
                    type: string
              type:
                type: string
              enabled:
                type: boolean
              accountName:
                type: string
              dmPolicy:
                type: string
              botName:
                type: string
              secretRefs:
                type: object
                properties:
                  appId:
                    type: object
                    properties:
                      name:
                        type: string
                      key:
                        type: string
                  appSecret:
                    type: object
                    properties:
                      name:
                        type: string
                      key:
                        type: string
              requireMention:
                type: string
              groupPolicy:
                type: string
              groups:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    requireMention:
                      type: boolean
          status:
            type: object
            properties:
              phase:
                type: string
              message:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Type
      type: string
      jsonPath: .spec.type
    - name: Account
      type: string
      jsonPath: .spec.accountName
    - name: Enabled
      type: boolean
      jsonPath: .spec.enabled
    - name: OpenClawRef
      type: string
      jsonPath: .spec.openclawRef.name
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
