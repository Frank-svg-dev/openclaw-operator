apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawagentdefaults.openclaw.io
spec:
  group: openclaw.io
  names:
    kind: OpenClawAgentDefaults
    listKind: OpenClawAgentDefaultsList
    plural: openclawagentdefaults
    singular: openclawagentdefaults
    shortNames:
    - oad
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            properties:
              openclawRef:
                type: object
                properties:
                  name:
                    type: string
              primaryModel:
                type: string
              fallbacks:
                type: array
                items:
                  type: string
              workspace:
                type: string
          status:
            type: object
            properties:
              phase:
                type: string
              message:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: OpenClawRef
      type: string
      jsonPath: .spec.openclawRef.name
    - name: PrimaryModel
      type: string
      jsonPath: .spec.primaryModel
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
