apiVersion: v1
kind: Secret
metadata:
  name: feishu-secret
  namespace: test
type: Opaque
stringData:
  appId: "<YOUR_APP_ID>"
  appSecret: "<YOUR_APP_SECRET>"
---
apiVersion: openclaw.io/v1
kind: OpenClawChannel
metadata:
  name: feishu-main
  namespace: test
spec:
  openclawRef:
    name: openclaw-sample
  type: feishu
  enabled: true
  accountName: main
  dmPolicy: pairing
  botName: "巴尔坦星人"
  requireMention: "open"
  groupPolicy: "open"
  groups:
    oc_532044075a61d112f04fa63109c75e9b:
      requireMention: true
  secretRefs:
    appId:
      name: feishu-secret
      key: appId
    appSecret:
      name: feishu-secret
      key: appSecret
